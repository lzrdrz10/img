<body class="text-white min-h-screen flex flex-col items-center p-6 bg-[#050505]">

  <!-- Título -->
  <h2 class="text-5xl font-bold neon-text mb-8 text-center tracking-widest">PANEL LZPLAY</h2>
  
  <!-- BOTÓN MANUAL (reemplaza toda la búsqueda automática) -->
  <div class="flex justify-center mb-12">
    <button onclick="openManualModal()" 
            class="px-12 py-6 text-3xl font-bold bg-gradient-to-r from-[#00ff7f] to-[#00cc66] text-black rounded-3xl flex items-center gap-4 hover:scale-105 transition neon-text shadow-2xl shadow-[#00ff7f]/50">
      <i class="fas fa-plus text-4xl"></i>
      CREAR PELÍCULA MANUALMENTE
    </button>
  </div>

  <!-- MODAL MEJORADO - TODO MANUAL -->
  <div id="modal" class="fixed inset-0 bg-black/95 justify-center items-center z-[9999] p-4 hidden">
    <div class="modal-content bg-[#111] rounded-3xl shadow-2xl w-full max-w-3xl border border-[#00ff7f]/50 flex flex-col max-h-[92vh] overflow-hidden">
      
      <!-- Header fijo -->
      <div class="flex justify-between items-center border-b border-[#00ff7f]/30 px-8 py-5 flex-shrink-0">
        <h3 id="modal-titulo" class="text-2xl font-bold neon-text">Nueva Película - Ingresa los datos manualmente</h3>
        <button onclick="cerrarModal()" class="text-4xl text-gray-400 hover:text-red-500 transition">×</button>
      </div>

      <!-- ZONA SCROLLABLE -->
      <div class="flex-1 overflow-y-auto custom-scroll p-8 space-y-8" id="modal-content">

        <!-- === FORMULARIO MANUAL === -->
        <div id="form-area">

          <!-- Información básica -->
          <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Poster -->
            <div class="lg:col-span-3">
              <label class="block text-[#00ff7f] text-sm mb-2 font-medium">🖼️ URL DEL POSTER</label>
              <input id="manual-poster" type="text" class="w-full p-4 rounded-2xl bg-[#1a1a1a] border border-[#00ff7f]/50 focus:border-[#00ff7f]" placeholder="https://image.tmdb.org/t/p/original/...">
              <img id="manual-poster-preview" src="https://via.placeholder.com/300x450/111/00ff7f?text=POSTER" class="mt-4 w-full rounded-2xl shadow-xl aspect-[2/3] object-cover">
            </div>

            <!-- Datos principales -->
            <div class="lg:col-span-9 space-y-6">
              <div>
                <label class="block text-[#00ff7f] text-sm mb-2 font-medium">📽️ TÍTULO</label>
                <input id="manual-titulo" type="text" class="w-full p-4 rounded-2xl bg-[#1a1a1a] border border-[#00ff7f]/50 focus:border-[#00ff7f] text-2xl font-bold">
              </div>
              <div class="grid grid-cols-2 gap-6">
                <div>
                  <label class="block text-[#00ff7f] text-sm mb-2 font-medium">📅 AÑO</label>
                  <input id="manual-year" type="text" class="w-full p-4 rounded-2xl bg-[#1a1a1a] border border-[#00ff7f]/50 focus:border-[#00ff7f]" placeholder="2025">
                </div>
                <div>
                  <label class="block text-[#00ff7f] text-sm mb-2 font-medium">🌍 TÍTULO ORIGINAL</label>
                  <input id="manual-original" type="text" class="w-full p-4 rounded-2xl bg-[#1a1a1a] border border-[#00ff7f]/50 focus:border-[#00ff7f]">
                </div>
              </div>
              <div>
                <label class="block text-[#00ff7f] text-sm mb-2 font-medium">📝 SINOPSIS</label>
                <textarea id="manual-sinopsis" rows="4" class="w-full p-4 rounded-2xl bg-[#1a1a1a] border border-[#00ff7f]/50 focus:border-[#00ff7f] text-gray-300 leading-relaxed"></textarea>
              </div>
            </div>
          </div>

          <!-- Datos adicionales -->
          <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div>
              <label class="block text-[#00ff7f] text-sm mb-2 font-medium">⏱️ DURACIÓN (minutos)</label>
              <input id="manual-duration" type="number" value="120" class="w-full p-4 rounded-2xl bg-[#1a1a1a] border border-[#00ff7f]/50 focus:border-[#00ff7f]">
            </div>
            <div>
              <label class="block text-[#00ff7f] text-sm mb-2 font-medium">📆 FECHA DE LANZAMIENTO</label>
              <input id="manual-release" type="date" class="w-full p-4 rounded-2xl bg-[#1a1a1a] border border-[#00ff7f]/50 focus:border-[#00ff7f]">
            </div>
            <div>
              <label class="block text-[#00ff7f] text-sm mb-2 font-medium">🎥 TRAILER YOUTUBE ID</label>
              <input id="manual-trailer" type="text" class="w-full p-4 rounded-2xl bg-[#1a1a1a] border border-[#00ff7f]/50 focus:border-[#00ff7f]" placeholder="dQw4w9wgxcQ">
            </div>
            <div>
              <label class="block text-[#00ff7f] text-sm mb-2 font-medium">🔢 ID TMDB (opcional)</label>
              <input id="manual-tmdb-id" type="text" class="w-full p-4 rounded-2xl bg-[#1a1a1a] border border-[#00ff7f]/50 focus:border-[#00ff7f]" placeholder="123456">
            </div>
          </div>

          <!-- Backdrop -->
          <div>
            <label class="block text-[#00ff7f] text-sm mb-2 font-medium">🌄 URL DEL BACKDROP (opcional - se usa en el player)</label>
            <input id="manual-backdrop" type="text" class="w-full p-4 rounded-2xl bg-[#1a1a1a] border border-[#00ff7f]/50 focus:border-[#00ff7f]" placeholder="https://image.tmdb.org/t/p/original/...">
          </div>

          <!-- Enlaces de video y descarga -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-[#00ff7f] text-sm mb-2">🎬 URL DEL VIDEO</label>
              <input id="videoLink" type="text" class="w-full p-4 rounded-2xl bg-[#1a1a1a] border border-[#00ff7f]/50 focus:border-[#00ff7f]" placeholder="Pega el .mp4 o el enlace completo del Premium Player">
            </div>
            <div>
              <label class="block text-[#00ff7f] text-sm mb-2">⬇️ URL DE DESCARGA (opcional)</label>
              <input id="downloadLink" type="text" class="w-full p-4 rounded-2xl bg-[#1a1a1a] border border-[#00ff7f]/50 focus:border-[#00ff7f]" placeholder="https://...">
            </div>
          </div>

          <!-- PLATAFORMAS -->
          <div>
            <label class="block text-[#00ff7f] text-sm mb-3 font-medium">📌 PLATAFORMAS (selecciona todas las que quieras)</label>
            <div id="platforms-container" class="flex flex-wrap gap-3"></div>
          </div>

          <!-- GÉNEROS / ETIQUETAS -->
          <div>
            <label class="block text-[#00ff7f] text-sm mb-3 font-medium">🏷️ GÉNEROS / ETIQUETAS</label>
            <div id="tags-container" class="flex flex-wrap gap-3 mb-4"></div>
            <div class="flex gap-3">
              <input id="new-tag" type="text" placeholder="Agregar etiqueta extra (ej: Terror, 4K, etc)" class="flex-1 p-4 rounded-2xl bg-[#1a1a1a] border border-[#00ff7f]/50">
              <button id="add-tag-btn" class="px-8 bg-gradient-to-r from-[#00ff7f] to-[#00cc66] text-black font-bold rounded-2xl">+ AGREGAR</button>
            </div>
          </div>

        </div>

        <!-- === ÉXITO === -->
        <div id="success-area" class="p-8 flex flex-col items-center justify-center text-center min-h-[420px] hidden">
          <div class="text-8xl mb-6 animate-bounce">✅</div>
          <h3 class="text-4xl font-bold text-[#00ff7f] neon-text mb-3">¡CÓDIGO GENERADO!</h3>
          <p class="text-gray-400 text-lg mb-10">Ya puedes copiarlo o descargarlo</p>
          
          <button onclick="copyGeneratedCode()" id="copy-success-btn" class="w-full max-w-md py-8 text-3xl font-bold bg-gradient-to-r from-[#00ff7f] to-[#00cc66] text-black rounded-3xl hover:scale-105 transition shadow-2xl shadow-[#00ff7f]/50 mb-6">
            📋 COPIAR CÓDIGO
          </button>
          <div class="grid grid-cols-2 gap-4 w-full max-w-md">
            <button onclick="downloadGeneratedCode()" class="py-6 rounded-3xl bg-white/10 hover:bg-white/20 border border-white/30 font-bold text-lg transition">
              ⬇️ DESCARGAR .html
            </button>
            <button onclick="previewGeneratedCode()" class="py-6 rounded-3xl bg-white/10 hover:bg-white/20 border border-white/30 font-bold text-lg transition">
              👁️ PREVISUALIZAR
            </button>
          </div>
          <button onclick="resetModalForNewMovie()" class="mt-12 text-[#00ff7f] hover:text-[#00ff7f]/70 underline text-lg flex items-center gap-2">
            ← Crear nueva película
          </button>
        </div>
      </div>

      <!-- Botones fijos abajo -->
      <div id="footer-form" class="px-8 py-6 border-t border-[#00ff7f]/30 flex gap-4 flex-shrink-0">
        <button id="publicarBtn" class="flex-1 py-5 rounded-3xl font-bold text-2xl bg-gradient-to-r from-[#00ff7f] to-[#00cc66] text-black hover:scale-105 transition">
          ✅ GENERAR CÓDIGO
        </button>
        <button onclick="cerrarModal()" class="flex-1 py-5 rounded-3xl font-bold text-2xl bg-red-600 hover:bg-red-700 transition">
          ❌ CANCELAR
        </button>
      </div>

      <!-- Animación de carga -->
      <div id="animacionPublicar" class="px-8 pb-8 hidden">
        <div class="w-full h-3 bg-[#1a1a1a] rounded-3xl overflow-hidden">
          <div id="progreso" class="h-3 bg-[#00ff7f] w-0 transition-all"></div>
        </div>
        <p class="text-center mt-3 text-[#00ff7f]">Generando código...</p>
      </div>
    </div>
  </div>

 <script src="script.js"></script>
</body>
</html>
